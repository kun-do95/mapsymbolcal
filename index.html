<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>어센틱 심볼 통합 계산기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin-bottom: 30px; }
        .calc-card { border: 1px solid #ddd; border-radius: 15px; padding: 25px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .header { text-align: center; margin-bottom: 15px; }
        .symbol-img { width: 60px; height: 60px; margin-bottom: 10px; object-fit: contain; background: #eee; border-radius: 50%; }
        .symbol-name { font-size: 17px; font-weight: bold; color: #333; display: block; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 10px; }
        .level-status { text-align: center; margin-bottom: 5px; font-size: 14px; }
        .lv-input, .growth-input, .weekly, .goal, .extra { width: 55px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; outline: none; }
        .unpaid-area { text-align: center; color: #ff4d4f; font-weight: bold; font-size: 13px; margin-bottom: 15px; height: 18px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; }
        .input-group label { font-size: 12px; margin-bottom: 5px; color: #666; font-weight: bold; }
        .done-btn { width: 100%; padding: 10px; margin-bottom: 15px; background-color: #4caf50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .summary-board { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #333; color: white; padding: 15px 20px; border-radius: 12px; min-width: 220px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .event-skill-card { width: 1100px; padding: 25px; background: #fff1f1; border: 2px solid #ffcccc; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="setup-container" style="margin-bottom: 20px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 1100px; text-align: center;">
    <div style="margin-bottom: 15px;">
        <input type="password" id="api-key-input" placeholder="넥슨 API KEY 입력" style="padding: 10px; width: 400px; border-radius: 8px; border: 1px solid #ddd;">
        <button onclick="saveApiKey()" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer;">키 저장</button>
    </div>
    <div>
        <input type="text" id="char-name" placeholder="캐릭터 닉네임" style="padding: 10px; width: 250px; border-radius: 8px; border: 1px solid #ddd;">
        <button onclick="fetchCharacterData()" style="padding: 10px 30px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer;">정보 불러오기</button>
    </div>
</div>

<div class="summary-board">
    <div style="color: #bbb; font-size: 12px; margin-bottom: 10px;">전체 요약</div>
    <div class="summary-item"><span>전체 체납액:</span><span id="total-unpaid" style="color:#ff6b6b">0 메소</span></div>
    <div class="summary-item"><span>총 필요 메소:</span><span id="total-required" style="color:#ffd700">0 메소</span></div>
</div>

<div class="container" id="card-container"></div>

<div class="event-skill-card">
    <strong>✨ 그란디스 일일 미션 보상 (보약 스킬) ✨</strong><br><br>
    보약 레벨 설정: 
    <select id="buff-level" onchange="saveAndRefresh()" style="padding: 10px; border-radius: 10px;">
        <option value="0">미적용</option><option value="2">+2개</option><option value="3">+3개</option><option value="4">+4개</option><option value="5">+5개</option><option value="7">+7개</option><option value="9">+9개</option>
    </select>
</div>

<script>
const needExp = { 1: 29, 2: 76, 3: 141, 4: 224, 5: 325, 6: 444, 7: 581, 8: 736, 9: 909, 10: 1100, 11: 0 };
const regions = [
    { id: 'cernium', name: '세르니움', daily: 30, costs: [0, 3650, 9120, 16070, 24190, 33150, 42620, 52290, 61820, 70900, 79200] },
    { id: 'arcus', name: '호텔 아르크스', daily: 15, costs: [0, 4170, 10480, 18610, 28220, 39000, 50610, 62740, 75070, 87260, 99000] },
    { id: 'odium', name: '오디움', daily: 15, costs: [0, 4690, 11850, 21150, 32250, 44850, 58600, 73200, 88320, 103620, 118800] },
    { id: 'shangriLa', name: '도원경', daily: 15, costs: [0, 5220, 13220, 23680, 36280, 50700, 66600, 83660, 101560, 119980, 138600] },
    { id: 'artieria', name: '아르테리아', daily: 15, costs: [0, 5740, 14590, 26220, 40320, 56550, 74590, 94120, 114810, 136350, 158400] },
    { id: 'carcion', name: '카르시온', daily: 15, costs: [0, 6260, 15960, 28760, 44350, 62400, 82580, 104580, 128060, 152710, 178200] }
];

function init() {
    const container = document.getElementById('card-container');
    container.innerHTML = '';
    regions.forEach(reg => {
        const saved = JSON.parse(localStorage.getItem(`symbol_${reg.id}`)) || {};
        const card = document.createElement('div');
        card.className = 'calc-card';
        card.id = `card-${reg.id}`;
        card.innerHTML = `
            <div class="header"><span class="symbol-name">어센틱심볼 : ${reg.name}</span></div>
            <div class="level-status">레벨 <input type="number" class="lv-input" value="${saved.lv || 1}" oninput="saveAndRefresh('${reg.id}')"> EXP <input type="number" class="growth-input" value="${saved.count || 0}" oninput="saveAndRefresh('${reg.id}')"></div>
            <div class="unpaid-area" id="unpaid-val-${reg.id}">체납: 0메소</div>
            <div class="input-grid">
                <div class="input-group"><label>일퀘</label><span id="display-${reg.id}">${reg.daily}</span></div>
                <div class="input-group"><label>주간</label><input type="number" class="weekly" value="${saved.weekly || 0}" oninput="saveAndRefresh('${reg.id}')"></div>
                <div class="input-group"><label>목표</label><input type="number" class="goal" value="${saved.goal || 11}" oninput="saveAndRefresh('${reg.id}')"></div>
                <div class="input-group"><label>추가</label><input type="number" class="extra" value="${saved.extra || 0}" oninput="saveAndRefresh('${reg.id}')"></div>
            </div>
            <button class="done-btn" onclick="completeDaily('${reg.id}')">일퀘 완료</button>
            <div style="border-top:1px solid #eee; padding-top:10px; font-size:13px;">
                완료일: <span class="res-date">-</span><br>
                메소: <span id="need-val-${reg.id}">0</span>
            </div>
        `;
        container.appendChild(card);
    });
    updateAll();
}

function saveApiKey() { localStorage.setItem('nexon_api_key', document.getElementById('api-key-input').value); alert("저장됨"); }

async function fetchCharacterData() {
    const key = localStorage.getItem('nexon_api_key');
    const name = document.getElementById('char-name').value;
    if(!key || !name) return alert("키와 이름을 확인하세요.");
    try {
        const res1 = await fetch(`https://open.api.nexon.com/maplestory/v1/id?character_name=${encodeURIComponent(name)}`, { headers: {"x-nxopen-api-key": key} });
        const d1 = await res1.json();
        const res2 = await fetch(`https://open.api.nexon.com/maplestory/v1/character/symbol-equipment?ocid=${d1.ocid}`, { headers: {"x-nxopen-api-key": key} });
        const d2 = await res2.json();
        const map = {"세르니움":"cernium","아르크스":"arcus","오디움":"odium","도원경":"shangriLa","아르테리아":"artieria","카르시온":"carcion"};
        d2.symbol.forEach(s => {
            for(let k in map) {
                if(s.symbol_name.includes(k)) {
                    const c = document.getElementById(`card-${map[k]}`);
                    c.querySelector('.lv-input').value = s.symbol_level;
                    c.querySelector('.growth-input').value = s.symbol_count;
                    saveAndRefresh(map[k]);
                }
            }
        });
        alert("동기화 완료");
    } catch(e) { alert("오류 발생"); }
}

function saveAndRefresh(id) {
    if(id) {
        const c = document.getElementById(`card-${id}`);
        localStorage.setItem(`symbol_${id}`, JSON.stringify({
            lv: c.querySelector('.lv-input').value, count: c.querySelector('.growth-input').value,
            weekly: c.querySelector('.weekly').value, goal: c.querySelector('.goal').value, extra: c.querySelector('.extra').value
        }));
    }
    updateAll();
}

function completeDaily(id) {
    const c = document.getElementById(`card-${id}`);
    const reg = regions.find(r => r.id === id);
    const buff = parseInt(document.getElementById('buff-level').value) || 0;
    const input = c.querySelector('.growth-input');
    input.value = (parseInt(input.value) || 0) + reg.daily + buff;
    saveAndRefresh(id);
}

function updateAll() {
    let tUnpaid = 0, tNeed = 0;
    regions.forEach(reg => {
        const c = document.getElementById(`card-${reg.id}`);
        const lv = parseInt(c.querySelector('.lv-input').value) || 1;
        const count = parseInt(c.querySelector('.growth-input').value) || 0;
        const goal = parseInt(c.querySelector('.goal').value) || 11;
        const buff = parseInt(document.getElementById('buff-level').value) || 0;
        const daily = reg.daily + buff;

        let unpaid = 0, tc = count, tl = lv;
        while(tl < 11 && tc >= (needExp[tl] || 9999)) { unpaid += reg.costs[tl]*10000; tc -= needExp[tl]; tl++; }
        document.getElementById(`unpaid-val-${reg.id}`).innerText = `체납: ${unpaid.toLocaleString()}메소`;
        tUnpaid += unpaid;

        let req = 0, cost = 0;
        for(let i=lv; i<goal; i++) { req += (needExp[i] || 0); cost += (reg.costs[i] || 0)*10000; }
        const left = Math.max(0, req - count - (parseInt(c.querySelector('.extra').value) || 0));
        const days = daily > 0 ? Math.ceil(left / (daily + (parseInt(c.querySelector('.weekly').value)||0)/7)) : 0;
        
        const d = new Date(); d.setDate(d.getDate() + days);
        c.querySelector('.res-date').innerText = days <= 0 ? "완료" : `${d.getMonth()+1}/${d.getDate()}`;
        document.getElementById(`need-val-${reg.id}`).innerText = cost.toLocaleString();
        tNeed += cost;
    });
    document.getElementById('total-unpaid').innerText = tUnpaid.toLocaleString() + " 메소";
    document.getElementById('total-required').innerText = tNeed.toLocaleString() + " 메소";
}

init();
</script>
</body>
</html>
