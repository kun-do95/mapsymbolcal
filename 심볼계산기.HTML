<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>어센틱 심볼 통합 계산기 (일퀘 완료 버튼 추가)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin-bottom: 30px; }
        
        .calc-card { border: 1px solid #ddd; border-radius: 15px; padding: 25px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; position: relative; }
        .header { text-align: center; margin-bottom: 15px; }
        .symbol-img { width: 60px; height: 60px; margin-bottom: 10px; object-fit: contain; }
        .symbol-name { font-size: 17px; font-weight: bold; color: #333; display: block; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 10px; }
        
        .level-status { text-align: center; margin-bottom: 5px; font-size: 14px; }
        .lv-input, .growth-input, .weekly, .goal, .extra { 
            width: 55px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; 
            text-align: left; font-weight: bold; outline: none; background: #fafafa;
        }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .max-growth { color: #007bff; font-weight: bold; }
        .unpaid-area { text-align: center; color: #ff4d4f; font-weight: bold; font-size: 13px; margin-bottom: 15px; height: 18px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: flex-start; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; font-weight: bold; }
        
        .daily-display { font-size: 18px; font-weight: bold; color: #333; padding: 4px 0; display: block; text-align: left; width: 100%; }
        .bonus-added { color: #d32f2f; }

        /* 일퀘 완료 버튼 스타일 */
        .done-btn {
            width: 100%; padding: 10px; margin-bottom: 15px; background-color: #4caf50; color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .done-btn:hover { background-color: #43a047; }
        .done-btn:active { background-color: #388e3c; }

        .result-section { border-top: 1px solid #f0f0f0; padding-top: 15px; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th { background: #f8f9fa; border: 1px solid #eee; padding: 8px; text-align: left; font-size: 13px; width: 40%; }
        .result-table td { border: 1px solid #eee; padding: 8px; text-align: right; font-size: 13px; font-weight: bold; }
        .highlight-text { color: #d32f2f; }

        .event-skill-card { 
            width: 1100px; padding: 25px; background: #fff1f1; border: 2px solid #ffcccc; 
            border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .skill-select { padding: 10px 20px; border-radius: 10px; border: 1px solid #ffcccc; font-size: 14px; font-weight: bold; cursor: pointer; outline: none; }
        /* 오른쪽 상단 요약 보드 */
        .summary-board {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: #333; color: white; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 220px;
        }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .summary-val { font-weight: bold; margin-left: 15px; }
        .sum-red { color: #ff6b6b; }
        .sum-gold { color: #ffd700; }
    </style>
</head>
<body>

<!-- 전체 요약 보드 -->
<div class="summary-board">
    <div style="font-weight: bold; font-size: 12px; color: #bbb; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px;">전체 요약</div>
    <div class="summary-item">
        <span>전체 체납액:</span>
        <span class="summary-val sum-red" id="total-unpaid">0 메소</span>
    </div>
    <div class="summary-item">
        <span>총 필요 메소:</span>
        <span class="summary-val sum-gold" id="total-required">0 메소</span>
    </div>
</div>

<div class="container" id="card-container"></div>

<div class="event-skill-card">
    <strong style="color:#d32f2f; display:block; margin-bottom:10px;">✨ 그란디스 일일 미션 보상 (보약 스킬) ✨</strong>
    보약 레벨 설정: 
    <select id="buff-level" class="skill-select" onchange="saveAndRefresh()">
        <option value="0">보약 스킬 미적용</option>
        <option value="2">1레벨 (+2개)</option>
        <option value="3">2레벨 (+3개)</option>
        <option value="4">3레벨 (+4개)</option>
        <option value="5">4레벨 (+5개)</option>
        <option value="7">5레벨 (+7개)</option>
        <option value="9">6레벨 (+9개)</option>
    </select>
</div>

<script>
const needExp = { 1: 29, 2: 76, 3: 141, 4: 224, 5: 325, 6: 444, 7: 581, 8: 736, 9: 909, 10: 1100, 11: 0 };
const regions = [
    { id: 'cernium', name: '세르니움', daily: 30, img: 'cernium.png', costs: [0, 3650, 9120, 16070, 24190, 33150, 42620, 52290, 61820, 70900, 79200] },
    { id: 'arcus', name: '호텔 아르크스', daily: 15, img: 'arcus.png', costs: [0, 4170, 10480, 18610, 28220, 39000, 50610, 62740, 75070, 87260, 99000] },
    { id: 'odium', name: '오디움', daily: 15, img: 'odium.png', costs: [0, 4690, 11850, 21150, 32250, 44850, 58600, 73200, 88320, 103620, 118800] },
    { id: 'shangriLa', name: '도원경', daily: 15, img: 'shangrila.png', costs: [0, 5220, 13220, 23680, 36280, 50700, 66600, 83660, 101560, 119980, 138600] },
    { id: 'artieria', name: '아르테리아', daily: 15, img: 'artieria.png', costs: [0, 5740, 14590, 26220, 40320, 56550, 74590, 94120, 114810, 136350, 158400] },
    { id: 'carcion', name: '카르시온', daily: 15, img: 'carcion.png', costs: [0, 6260, 15960, 28760, 44350, 62400, 82580, 104580, 128060, 152710, 178200] }
];

const container = document.getElementById('card-container');

regions.forEach(reg => {
    const savedData = JSON.parse(localStorage.getItem(`symbol_${reg.id}`)) || {};
    const card = document.createElement('div');
    card.className = 'calc-card';
    card.id = `card-${reg.id}`;
    card.innerHTML = `
        <div class="header">
            <img src="${reg.img}" alt="${reg.name}" class="symbol-img" onerror="this.style.display='none'">
            <span class="symbol-name">어센틱심볼 : ${reg.name}</span>
        </div>
        <div class="level-status">
            레벨 <input type="number" class="lv-input" value="${savedData.lv || 1}" min="1" max="11" oninput="saveAndRefresh('${reg.id}')"> 
            EXP <input type="number" class="growth-input" value="${savedData.count || 0}" oninput="saveAndRefresh('${reg.id}')"> 
            / <span class="max-growth">29</span>
        </div>
        <div class="unpaid-area unpaid-text" id="unpaid-val-${reg.id}">체납: 0메소</div>
        <div class="input-grid">
            <div class="input-group"><label>기본 일퀘</label><span class="daily-display" id="display-${reg.id}">${reg.daily}</span></div>
            <div class="input-group"><label>주간퀘 획득량</label><input type="number" class="weekly" value="${savedData.weekly || 0}" oninput="saveAndRefresh('${reg.id}')"></div>
            <div class="input-group"><label>목표 레벨</label><input type="number" class="goal" value="${savedData.goal || 11}" oninput="saveAndRefresh('${reg.id}')"></div>
            <div class="input-group"><label>추가 심볼</label><input type="number" class="extra" value="${savedData.extra || 0}" oninput="saveAndRefresh('${reg.id}')"></div>
        </div>
        <button class="done-btn" onclick="completeDaily('${reg.id}')">오늘 일퀘 완료</button>
        <div class="result-section">
            <table class="result-table">
                <tr><th>완료일</th><td class="res-date">-</td></tr>
                <tr><th>필요심볼</th><td class="res-symbol highlight-text">0개</td></tr>
                <tr><th>필요메소</th><td class="res-meso highlight-text" id="need-val-${reg.id}">0메소</td></tr>
            </table>
        </div>
    `;
    container.appendChild(card);
});

window.onload = function() {
    const savedBuff = localStorage.getItem('symbol_buff_level');
    if (savedBuff !== null) document.getElementById('buff-level').value = savedBuff;
    updateAll();
};

// 전체 체납 및 필요 메소 합산 로직
function updateSummary() {
    let totalUnpaid = 0;
    let totalRequired = 0;

    regions.forEach(reg => {
        const unpaidEl = document.getElementById(`unpaid-val-${reg.id}`);
        const needEl = document.getElementById(`need-val-${reg.id}`);
        
        if(unpaidEl && needEl) {
            totalUnpaid += parseInt(unpaidEl.innerText.replace(/[^0-9]/g, "")) || 0;
            totalRequired += parseInt(needEl.innerText.replace(/[^0-9]/g, "")) || 0;
        }
    });

    document.getElementById('total-unpaid').innerText = totalUnpaid.toLocaleString() + " 메소";
    document.getElementById('total-required').innerText = totalRequired.toLocaleString() + " 메소";
}

// 일퀘 완료 버튼 기능
function completeDaily(regionId) {
    const regData = regions.find(r => r.id === regionId);
    const card = document.getElementById(`card-${regionId}`);
    const growthInput = card.querySelector('.growth-input');
    
    const buffBonus = parseInt(document.getElementById('buff-level').value) || 0;
    const currentExp = parseInt(growthInput.value) || 0;
    const totalGain = regData.daily + buffBonus;

    // 현재 EXP에 획득량 추가
    growthInput.value = currentExp + totalGain;
    
    // 알림 후 저장 및 새로고침
    saveAndRefresh(regionId);
}

function saveAndRefresh(regionId) {
    if (regionId) {
        const card = document.getElementById(`card-${regionId}`);
        const data = {
            lv: card.querySelector('.lv-input').value,
            count: card.querySelector('.growth-input').value,
            weekly: card.querySelector('.weekly').value,
            goal: card.querySelector('.goal').value,
            extra: card.querySelector('.extra').value
        };
        localStorage.setItem(`symbol_${regionId}`, JSON.stringify(data));
        calculate(regionId);
    } else {
        localStorage.setItem('symbol_buff_level', document.getElementById('buff-level').value);
        updateAll();
    }
}

function updateAll() { regions.forEach(reg => calculate(reg.id));
    updateSummary(); }

function calculate(regionId) {
    const regData = regions.find(r => r.id === regionId);
    const card = document.getElementById(`card-${regionId}`);
    const lv = parseInt(card.querySelector('.lv-input').value) || 1;
    const count = parseInt(card.querySelector('.growth-input').value) || 0;
    const weekly = parseInt(card.querySelector('.weekly').value) || 0;
    const goal = parseInt(card.querySelector('.goal').value) || 11;
    const extra = parseInt(card.querySelector('.extra').value) || 0;

    const buffBonus = parseInt(document.getElementById('buff-level').value) || 0;
    const finalDaily = regData.daily + buffBonus;
    const displayEl = document.getElementById(`display-${regionId}`);
    displayEl.innerText = finalDaily;
    if (buffBonus > 0) displayEl.classList.add('bonus-added');
    else displayEl.classList.remove('bonus-added');

    card.querySelector('.max-growth').innerText = needExp[lv];

    let unpaidMeso = 0; let tempCount = count; let tempLv = lv;
    while (tempLv < 11 && tempCount >= (needExp[tempLv] || 999999)) {
        unpaidMeso += regData.costs[tempLv] * 10000;
        tempCount -= needExp[tempLv];
        tempLv++;
    }
    card.querySelector('.unpaid-text').innerText = unpaidMeso > 0 ? `체납: ${unpaidMeso.toLocaleString()}메소` : "체납: 0메소";

    let totalRequired = 0; let totalCost = 0;
    for (let i = lv; i < goal; i++) {
        totalRequired += (needExp[i] || 0);
        totalCost += (regData.costs[i] || 0) * 10000;
    }

    const netRequired = Math.max(0, totalRequired - count - extra);
    const dailyAvg = finalDaily + (weekly / 7);
    const daysLeft = dailyAvg > 0 ? Math.ceil(netRequired / dailyAvg) : 0;

    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + daysLeft);
    
    let dateStr = (lv >= goal || daysLeft === 0) ? "완료" : 
        `${targetDate.getFullYear()}년 ${(targetDate.getMonth()+1).toString().padStart(2,'0')}월 ${targetDate.getDate().toString().padStart(2,'0')}일`;

    card.querySelector('.res-symbol').innerText = netRequired.toLocaleString() + "개";
    card.querySelector('.res-meso').innerText = totalCost.toLocaleString() + "메소";
    card.querySelector('.res-date').innerText = dateStr;
    updateSummary();
}
</script>
</body>
</html>
